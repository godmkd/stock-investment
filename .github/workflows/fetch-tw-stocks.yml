name: Fetch TW Stock Data
on:
  schedule:
    - cron: '30 6 * * 1-5'  # 14:30 UTC+8, Mon-Fri (after market close)
  workflow_dispatch:  # Allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests supabase python-dateutil
      - run: python scripts/fetch_tw_stocks.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
